<!DOCTYPE html>
<html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python CS — 986 Soru</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#111318;--sf:#1a1d24;--s2:#22262f;--s3:#2b303b;--bd:#2e3340;--bh:#3d4455;
--tx:#c9cdd6;--t2:#7d8494;--t3:#505868;
--acc:#6366f1;--acl:rgba(99,102,241,.08);--acd:rgba(99,102,241,.25);
--g:#34d399;--gb:rgba(52,211,153,.06);--gd:rgba(52,211,153,.2);
--r:#fb7185;--rb:rgba(251,113,133,.06);--rd:rgba(251,113,133,.2);
--a:#fbbf24;--ab:rgba(251,191,36,.06);--ad:rgba(251,191,36,.2);
--b:#60a5fa;--bb:rgba(96,165,250,.06);
}
body{background:var(--bg);color:var(--tx);font-family:system-ui,-apple-system,sans-serif;line-height:1.65;-webkit-font-smoothing:antialiased}
code,.mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:.9em}
.app{max-width:880px;margin:0 auto;padding:16px 16px 100px}

.hero{text-align:center;padding:32px 20px 24px;margin-bottom:16px;border-bottom:1px solid var(--bd)}
.hero h1{font-size:clamp(20px,4vw,28px);font-weight:800;color:var(--tx);letter-spacing:-.02em}
.hero h1 span{color:var(--acc)}
.hero p{color:var(--t3);font-size:12px;font-family:ui-monospace,monospace;margin-top:4px}

.sts{display:flex;gap:4px;margin:10px 0;flex-wrap:wrap}
.stt{flex:1;min-width:68px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:8px 4px;text-align:center}
.sv{font-family:ui-monospace,monospace;font-size:18px;font-weight:700;color:var(--acc)}
.sl{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
.pbar{height:3px;background:var(--s2);border-radius:2px;overflow:hidden;margin-bottom:12px}
.pfill{height:100%;background:var(--acc);border-radius:2px;transition:width .4s}

.nav{display:flex;gap:3px;margin-bottom:12px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch}
.nav::-webkit-scrollbar{height:0}
.nb{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:6px 8px;cursor:pointer;white-space:nowrap;font-size:10px;color:var(--t2);display:flex;flex-direction:column;align-items:center;gap:1px;min-width:60px;transition:.15s;touch-action:manipulation}
.nb:hover{border-color:var(--bh);color:var(--tx)}.nb.on{border-color:var(--acc);color:var(--acc);background:var(--acl)}
.nb em{font-size:14px;font-style:normal}.nb b{font-weight:600;font-size:9px}.nb small{font-family:ui-monospace,monospace;font-size:8px;color:var(--t3)}

.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:12px}
.tab{padding:8px 14px;cursor:pointer;font-size:12px;font-weight:600;color:var(--t3);border:none;border-bottom:2px solid transparent;background:none;transition:.15s;touch-action:manipulation}
.tab:hover{color:var(--t2)}.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.pnl{display:none}.pnl.on{display:block}

.lsn{line-height:1.75}
.lsn h3{font-size:14px;font-weight:700;margin:16px 0 6px;padding-left:10px;border-left:2px solid var(--acc)}.lsn h3:first-child{margin-top:0}
.lsn p{color:var(--t2);font-size:13px;margin-bottom:6px}.lsn ul{color:var(--t2);font-size:13px;margin:0 0 8px 16px}.lsn li{margin-bottom:3px}
.lsn strong,.lsn b{color:var(--tx)}.lsn code{background:var(--s2);padding:1px 4px;border-radius:3px;font-size:11px;color:var(--a)}

.bx{border-radius:8px;padding:10px;margin:8px 0;font-size:12px;line-height:1.6}.bx ul{margin-left:14px}.bx li{margin-bottom:2px}
.bx-r{background:var(--rb);border:1px solid var(--rd)}.bx-r b{color:var(--r)}
.bx-c{background:var(--acl);border:1px solid var(--acd)}.bx-c b{color:var(--acc)}
.bx-g{background:var(--gb);border:1px solid var(--gd)}.bx-g b{color:var(--g)}


.cb{background:#0c0e14;border:1px solid var(--bd);border-radius:6px;padding:8px 10px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;line-height:1.85;overflow-x:auto;margin:6px 0;white-space:pre;color:var(--t2)}

.qc{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:8px;transition:.2s}
.qc.ok{border-color:var(--gd)}.qc.no{border-color:var(--rd)}
.qn{font-family:ui-monospace,monospace;font-size:9px;color:var(--t3);margin-bottom:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.qt,.dif{display:inline-block;font-size:8px;padding:2px 5px;border-radius:3px;font-weight:700}
.d1{background:rgba(52,211,153,.08);color:var(--g)}.d2{background:rgba(251,191,36,.08);color:var(--a)}.d3{background:rgba(251,113,133,.08);color:var(--r)}
.qq{font-size:13px;margin-bottom:8px;line-height:1.65}.qq b{color:var(--acc);font-weight:600}

.opts{display:flex;flex-direction:column;gap:4px}
.ob{background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:8px;cursor:pointer;text-align:left;font-size:12px;color:var(--tx);display:flex;align-items:center;gap:7px;transition:.15s;touch-action:manipulation}
.ob:hover:not(.dis){border-color:var(--bh)}.oi{font-family:ui-monospace,monospace;font-size:9px;font-weight:700;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;background:var(--sf);border:1px solid var(--bd);flex-shrink:0}
.ob.sok{border-color:var(--g);background:var(--gb)}.ob.sok .oi{background:var(--g);color:var(--bg)}
.ob.sno{border-color:var(--r);background:var(--rb)}.ob.sno .oi{background:var(--r);color:var(--bg)}.ob.dis{cursor:default;opacity:.55}

.tfr{display:flex;gap:5px}.tfb{flex:1;padding:10px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);cursor:pointer;font-size:13px;font-weight:600;color:var(--tx);text-align:center;transition:.15s;touch-action:manipulation}
.tfb:hover:not(.dis){border-color:var(--bh)}.tfb.st{border-color:var(--g);background:var(--gb);color:var(--g)}.tfb.sf{border-color:var(--r);background:var(--rb);color:var(--r)}

.ai{width:100%;background:#0c0e14;border:1px solid var(--bd);border-radius:6px;padding:9px 10px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:13px;color:var(--tx);outline:none}.ai:focus{border-color:var(--acc)}.ai::placeholder{color:var(--t3)}
.ce{width:100%;min-height:100px;background:#0c0e14;border:1px solid var(--bd);border-radius:6px;padding:8px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;line-height:1.75;color:var(--tx);outline:none;resize:vertical}.ce:focus{border-color:var(--acc)}

.btn{border:none;border-radius:6px;padding:8px 16px;font-weight:600;font-size:12px;cursor:pointer;transition:.15s;touch-action:manipulation}
.bp{background:var(--acc);color:#fff}.bp:hover{opacity:.9}
.bh{background:var(--ab);border:1px solid var(--ad);color:var(--a);font-size:11px;padding:5px 10px}.bh:hover{background:var(--a);color:var(--bg)}
.bs{background:var(--s2);border:1px solid var(--bd);color:var(--t2);font-size:11px;padding:6px 12px}.bs:hover{border-color:var(--acc);color:var(--acc)}
.br{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}

.hn{margin-top:5px;padding:7px 8px;border-radius:6px;font-size:11px;line-height:1.5;background:var(--ab);border:1px solid var(--ad)}.hn b{color:var(--a)}
.fb{margin-top:6px;padding:8px 10px;border-radius:6px;font-size:11px;line-height:1.5;display:none}.fb.sh{display:block}
.fb.fok{background:var(--gb);border:1px solid var(--gd)}.fb.fno{background:var(--rb);border:1px solid var(--rd)}
.fbt{font-weight:700;margin-bottom:2px}.fb.fok .fbt{color:var(--g)}.fb.fno .fbt{color:var(--r)}
.fbe{color:var(--t2);font-size:11px}

.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:4px;margin:6px 0}
.rc{background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:8px}.rc h4{font-size:10px;font-weight:700;margin-bottom:2px;color:var(--acc)}.rc p{font-size:9px;color:var(--t2)}

.scb{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:16px;text-align:center;margin:10px 0}
.sn{font-family:ui-monospace,monospace;font-size:32px;font-weight:700}.sg{color:var(--g)}.ss{color:var(--t3)}
.rbtn{background:transparent;border:1px solid var(--bd);border-radius:6px;padding:5px 12px;color:var(--t3);font-size:10px;cursor:pointer;touch-action:manipulation}.rbtn:hover{border-color:var(--r);color:var(--r)}

.exam-ctrl{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:16px;text-align:center;margin-bottom:12px}
.exam-ctrl p{color:var(--t2);font-size:12px;margin-bottom:8px}
.exam-info{display:flex;gap:8px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.exam-badge{font-size:10px;padding:3px 8px;border-radius:4px;background:var(--s2);color:var(--t2);font-family:ui-monospace,monospace}

@supports(padding:env(safe-area-inset-bottom)){.app{padding-bottom:calc(80px + env(safe-area-inset-bottom))}}
@media(max-width:600px){.app{padding:8px 8px 70px}.qc{padding:12px}.rg{grid-template-columns:1fr 1fr}
.ai{font-size:16px;padding:12px}.ce{font-size:14px}.cb{font-size:12px;line-height:2}
.ob{padding:10px;font-size:13px}.tfb{padding:12px}.lsn p,.lsn li{font-size:13px}}
@media(max-width:380px){.rg{grid-template-columns:1fr}.nb{min-width:50px;padding:5px 4px}}
@media(hover:none){.ob:hover:not(.dis){border-color:var(--bd)}.nb:hover{border-color:var(--bd);color:var(--t2)}}
</style></head><body><div class="app" id="app"></div>
<script>
const D = [{"id": "types", "icon": "📦", "title": "Veri Tipleri & Değişkenler", "desc": "int, float, str, bool, type(), tip dönüşümleri", "lesson": "<h3>4 Temel Veri Tipi</h3><p><b>int</b> (tam sayı): 5, -24 | <b>float</b> (ondalık): 3.14, 6.0 | <b>str</b> (metin): 'hello' | <b>bool</b>: True, False</p><p><code>type()</code> ile tipi öğren. <code>\"123\"</code> string'tir, int değil!</p><h3>Değişkenler</h3><p>Harf veya _ ile başla. Keyword yasak. Her atama eski değeri siler. Anlamlı isim kullan!</p><div class=\"bx bx-r\"><b>⚠ DİKKAT:</b> <code>int(3.99)</code> = 3, 4 değil! int() keser, YUVARLAMAZ.</div><h3>Tip Dönüşümü</h3><p><code>int('32')</code>→32, <code>float(32)</code>→32.0, <code>str(42)</code>→'42'. <code>int('hello')</code>→ValueError!</p><h3>String İşlemleri</h3><p><code>+</code> birleştirme, <code>* int</code> tekrarlama. <code>-</code> ve <code>/</code> yasak!</p>", "ref": "<div class=\"rg\"><div class=\"rc\"><h4>int</h4><p>Tam sayı</p></div><div class=\"rc\"><h4>float</h4><p>Ondalık</p></div><div class=\"rc\"><h4>str</h4><p>Metin</p></div><div class=\"rc\"><h4>bool</h4><p>True/False</p></div><div class=\"rc\"><h4>type()</h4><p>Tip öğren</p></div><div class=\"rc\"><h4>int()</h4><p>Keser!</p></div><div class=\"rc\"><h4>float()</h4><p>Float'a çevir</p></div><div class=\"rc\"><h4>str()</h4><p>String'e çevir</p></div></div>", "questions": [{"t": "tf", "q": "\"42\" ifadesinin tipi int'dir.", "a": false, "e": "Tırnak içi = string.", "h": ["Tırnak tipi nasıl etkiler?"], "d": 1}, {"t": "tf", "q": "int(3.99) sonucu 4'tür.", "a": false, "e": "int() yuvarlamaz, keser! Sonuç 3.", "h": ["Yuvarlama mı kesme mi?"], "d": 1}, {"t": "tf", "q": "True ve False bool tipindedir.", "a": true, "e": "bool tipinin iki değeri, aynı zamanda keyword.", "h": ["bool kaç değer alır?"], "d": 1}, {"t": "mc", "q": "Hangisi geçerli değişken adı?", "o": ["2x", "my-var", "_count", "class"], "a": 2, "e": "_count geçerli. Diğerleri yasak.", "h": ["Değişken neyle başlar?"], "d": 1}, {"t": "out", "q": "Çıktısı?", "c": "x = 5\nprint(type(x))\nx = \"five\"\nprint(type(x))", "a": "<class 'int'>\n<class 'str'>", "e": "x önce int, sonra str olur.", "h": ["Tip değişebilir mi?"], "d": 2}, {"t": "out", "q": "Çıktısı?", "c": "print(str(42) + str(8))", "a": "428", "e": "String birleştirme: \"42\"+\"8\"=\"428\".", "h": ["str() ne yapar?"], "d": 2}, {"t": "mc", "q": "Hangisi SyntaxError verir?", "o": ["x = 42", "hello = \"a\"", "76ers = \"t\"", "_x = True"], "a": 2, "e": "Rakamla başlayan ad yasak.", "h": ["Rakamla başlama?"], "d": 1}, {"t": "out", "q": "Çıktısı?", "c": "x = 10\ny = x\nx = 20\nprint(y)", "a": "10", "e": "y, x'in değerini kopyalar. x değişse de y etkilenmez.", "h": ["Kopyalama mı referans mı?"], "d": 2}, {"t": "tf", "q": "\"Spam\" * 3 = \"SpamSpamSpam\"", "a": true, "e": "String × integer = tekrar.", "h": ["* stringle ne yapar?"], "d": 1}, {"t": "mc", "q": "float(\"3.14\") sonucu?", "o": ["3", "3.14", "\"3.14\"", "Hata"], "a": 1, "e": "float() string'i sayıya çevirir.", "h": ["float() string alır mı?"], "d": 1}, {"t": "out", "q": "Çıktısı?", "c": "a = \"Hello \"\nb = \"World\"\nprint(a + b)", "a": "Hello World", "e": "String + string = birleştirme.", "h": ["+ stringlerle?"], "d": 1}, {"t": "tf", "q": "Python'da x ve X aynı değişkendir.", "a": false, "e": "Python case-sensitive: x ≠ X.", "h": ["Büyük/küçük harf farkı?"], "d": 1}, {"t": "out", "q": "Çıktısı?", "c": "print(type(True))", "a": "<class 'bool'>", "e": "True bool tipindedir.", "h": ["True ne tipi?"], "d": 1}, {"t": "mc", "q": "int(\"hello\") ne verir?", "o": ["0", "\"hello\"", "Hata (ValueError)", "None"], "a": 2, "e": "Geçersiz dönüşüm → ValueError.", "h": ["Her string int'e çevrilebilir mi?"], "d": 2}, {"t": "out", "q": "Çıktısı?", "c": "x = \"3\"\ny = 4\nprint(x * y)", "a": "3333", "e": "\"3\" * 4 = \"3333\". String tekrar!", "h": ["String * int?"], "d": 2}, {"t": "tf", "q": "None bir değerdir ve kendi tipi vardır.", "a": true, "e": "None, NoneType tipindedir.", "h": ["None nedir?"], "d": 2 ax", "Runtime", "Semantic", "Hata oluşmaz"], "a": 1, "e": "Runtime: NameError: function not defined yet.", "h": ["Hatanın ne zaman ortaya çıktığını düşün."], "d": 3}, {"t": "mc", "q": "\"elif yerine ayrı if yazmak (farklı davranış!)\" — ne tür hata oluşur?", "o": ["Syntax", "Runtime", "Semantic", "Hata oluşmaz"], "a": 2, "e": "Semantic: Her if bağımsız kontrol eder, elif zincirler.", "h": ["Hatanın ne zaman ortaya çıktığını düşün."], "d": 3}, {"t": "mc", "q": "\"Accumulator başlangıcını yanlış vermek (0 yerine 1 veya tersi)\" — ne tür hata oluşur?", "o": ["Syntax", "Runtime", "Semantic", "Hata oluşmaz"], "a": 2, "e": "Semantic: Sonuç 1 fazla veya 0 olur.", "h": ["Hatanın ne zaman ortaya çıktığını düşün."], "d": 3}, {"t": "mc", "q": "\"Global değişkeni fonksiyon içinde değiştirmeye çalışmak (global keyword olmadan)\" — ne tür hata oluşur?", "o": ["Syntax", "Runtime", "Semantic", "Hata oluşmaz"], "a": 1, "e": "Runtime: UnboundLocalError.", "h": ["Hatanın ne zaman ortaya çıktığını düşün."], "d": 3}, {"t": "mc", "q": "\"Recursive fonksiyonda base case unutmak\" — ne tür hata oluşur?", "o": ["Syntax", "Runtime", "Semantic", "Hata oluşmaz"], "a": 1, "e": "Runtime: RecursionError: maximum depth exceeded.", "h": ["Hatanın ne zaman ortaya çıktığını düşün."], "d": 3}, {"t": "out", "q": "Çıktısı? (İleri fonksiyon)", "c": "def safe_div(a,b):\n    try:\n        return a/b\n    except ZeroDivisionError:\n        return None\nprint(safe_div(10,0))", "a": "None", "e": "try/except: hata yakalanır, None döner.", "h": ["Fonksiyon çağrılarını adım adım izle.", "Closure/scope kurallarını düşün."], "d": 3}]}, {"id": "astro", "icon": "♈", "title": "Astroloji (Sınav Provası)", "desc": "Sınav formatı — integer kod, fonksiyon, koşullar", "lesson": "<h3>Gereksinimler</h3><p>Doğum gününü <b>integer kod</b> al (22 Aralık→1222). En az 1 fonksiyon. if/elif/else ile burç.</p><div class=\"bx bx-r\"><b>⚠ KAĞIT SINAVI!</b> Interpreter yok!</div><h3>Input</h3><p><code>bd = int(input(\"...\"))</code> — D.forEach(m=>{if(m.id==='exam')return;m.questions.forEach(q=>{if(q.d>=2)pool.push({...q,src:m.id})})});

S.a=Object.fromEntries(Object.entries(S.a).filter(([k])=>!k.startsWith('exam_')));

for(let j=0;j<hl;j++)h+=`<div class="hn"><b>💡 ${j+1}:</b> ${q.h[j]}</div>`}
h+=`<div class="fb" id="f${i}"></div></div>`});

if(m.id!=='exam'){
const mD=curQs.filter((_,i)=>S.a[m.id+'_'+i]).length;
const mC=curQs.filter((_,i)=>{const a=S.a[m.id+'_'+i];return a&&a.c}).length;
if(mD===curQs.length&&curQs.length>0){
h+=`<div class="scb"><div style="font-size:11px;color:var(--t2)">Modül Tamamlandı!</div><div class="sn"><span class="sg">${mC}</span><span class="ss">/${curQs.length}</span></div><button class="rbtn" onclick="RM('${m.id}')">🔄 Sıfırla</button></div>`}}
h+='</div>';
h+=`<div class="pnl${ct==='ref'?' on':''}">${m.ref}</div>`;
$.innerHTML=h}

function newExam(){genExam();TT('q');R()}

function RTF(i,q,a,mid){let tc='',fc='',d=a?'dis':'';
if(a){if(a.s===true)tc=a.c?'st':'sf';if(a.s===false)fc=a.c?'st':'sf';
if(!a.c){if(q.a)tc=tc||'st';if(!q.a)fc=fc||'st'}}
return`<div class="tfr"><button class="tfb ${tc} ${d}" onclick="AF(${i},true,'${mid}')">✓ Doğru</button><button class="tfb ${fc} ${d}" onclick="AF(${i},false,'${mid}')">✗ Yanlış</button></div>`}

function RMC(i,q,a,mid){const L=['A','B','C','D'];
return`<div class="opts">${q.o.map((o,j)=>{let c='',d=a?'dis':'';
if(a){if(j===q.a)c='sok';else if(j===a.s)c='sno';d='dis'}
return`<button class="ob ${c} ${d}" onclick="AM(${i},${j},'${mid}')" ${d?'disabled':''}><span class="oi">${L[j]}</span><span>${o}</span></button>`}).join('')}</div>`}

function RO(i,q,a,mid){if(a){const c=a.c?'var(--g)':'var(--r)';
let h=`<div class="cb" style="border-color:${c}">${E(a.u)}</div>`;
if(!a.c)h+=`<div style="font-size:9px;color:var(--g);margin-top:3px">Doğru:</div><div class="cb" style="border-color:var(--g)">${E(q.a)}</div>`;
return h}
return`<input class="ai" id="i${i}" placeholder="Çıktıyı yaz..." onkeydown="if(event.key==='Enter')AO(${i},'${mid}')"><div class="br"><button class="btn bp" onclick="AO(${i},'${mid}')">Kontrol</button></div>`}

function RC(i,q,a,mid){if(a)return`<div class="bx bx-c"><b>Cevap:</b> <code>${E(q.an)}</code></div>`;
return`<div class="cb">${HL(q.tm)}</div><textarea class="ce" id="c${i}" placeholder="Kodunu yaz..."></textarea><div class="br"><button class="btn bp" onclick="AC(${i},'${mid}')">Cevabı Gör</button></div>`}

function getQ(i,mid){const m=D.find(x=>x.id===mid);if(mid==='exam')return(S.examQs||[])[i];return m?m.questions[i]:null}

function AF(i,v,mid){const k=mid+'_'+i;if(S.a[k])return;const q=getQ(i,mid);if(!q)return;const c=v===q.a;S.a[k]={c,s:v};UP(c);FB(i,c,q.e);sv();R();SQ(i)}
function AM(i,j,mid){const k=mid+'_'+i;if(S.a[k])return;const q=getQ(i,mid);if(!q)return;const c=j===q.a;S.a[k]={c,s:j};UP(c);FB(i,c,q.e);sv();R();SQ(i)}
function AO(i,mid){const k=mid+'_'+i;if(S.a[k])return;const q=getQ(i,mid);if(!q)return;const el=document.getElementById('i'+i);if(!el)return;const u=el.value.trim();if(!u)return;const c=N(u)===N(q.a);S.a[k]={c,s:null,u};UP(c);FB(i,c,q.e);sv();R();SQ(i)}
function AC(i,mid){const k=mid+'_'+i;if(S.a[k])return;const q=getQ(i,mid);if(!q)return;S.a[k]={c:true};UP(true);FB(i,true,q.e);sv();R();SQ(i)}
function N(s){return s.replace(/\s+/g,' ').replace(/[\u2018\u2019]/g,"'").replace(/[\u201c\u201d]/g,'"').toLowerCase().trim()}
function UP(c){S.tot++;if(c){S.sc++;S.str++}else S.str=0}
function FB(i,c,e){setTimeout(()=>{const el=document.getElementById('f'+i);if(!el)return;el.className=`fb sh ${c?'fok':'fno'}`;el.innerHTML=`<div class="fbt">${c?'✓ Doğru!':'✗ Yanlış'}</div><div class="fbe">${e}</div>`},30)}
function SQ(i){setTimeout(()=>{const el=document.getElementById('q'+i);if(el)el.scrollIntoView({behavior:'smooth',block:'center'})},100)}
function SH(k,i){const hk=k+'_h';S.hu[hk]=(S.hu[hk]||0)+1;sv();R();SQ(i)}
function G(i){S.m=i;sv();R();scrollTo({top:0,behavior:'smooth'})}
function TT(t){S.tabs[D[S.m].id]=t;sv();R()}
function RM(id){const qs=id==='exam'?(S.examQs||[]):D.find(m=>m.id===id).questions;
qs.forEach((_,i)=>{const k=id+'_'+i;if(S.a[k]){if(S.a[k].c)S.sc--;S.tot--;delete S.a[k]}delete S.hu[k+'_h']});S.str=0;sv();R()}
function HL(c){return c.split('\n').map((l,i)=>(i+1)+' │ '+E(l)).join('\n')}
function E(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
R();
